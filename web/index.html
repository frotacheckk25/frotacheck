<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FrotaCheck - Gestão de frota">
  <base href="$FLUTTER_BASE_HREF">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frotacheck">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>FrotaCheck</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Stub for PasskeyAuthenticator (required by passkeys_web, a transitive dependency of
    // supabase_flutter). Without it, window.PasskeyAuthenticator.init() throws a TypeError
    // during Flutter plugin registration and the app never renders (white screen).
    // This app does not use passkeys, so a no-op stub is sufficient.
    window.PasskeyAuthenticator = {
      init: function() {},
      register: function() { return Promise.reject('Passkeys not configured'); },
      login: function() { return Promise.reject('Passkeys not configured'); },
      cancelCurrentAuthenticatorOperation: function() {},
      isUserVerifyingPlatformAuthenticatorAvailable: function() { return Promise.resolve(false); },
      isConditionalMediationAvailable: function() { return Promise.resolve(false); },
      hasPasskeySupport: function() { return false; }
    };
  </script>
  <script>
    // Unregister all service workers and clear all caches unconditionally.
    // Flutter's PWA service worker intercepts requests before Cache-Control headers
    // take effect, causing mobile browsers to serve stale builds indefinitely.
    // Since this app is not distributed as an installed PWA, offline caching is not needed.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) { reg.unregister(); });
      });
      caches.keys().then(function(keys) {
        keys.forEach(function(key) { caches.delete(key); });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" type="module"></script>
</body>
</html>
